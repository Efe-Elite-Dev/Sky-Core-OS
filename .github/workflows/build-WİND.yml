name: Sky Core OS Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Repo Kaynak Kodlarını Çek
      uses: actions/checkout@v4

    - name: Python 3.10 Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Xvfb (Sanal Ekran Sürücüsü) Kurulumu
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb python3-tk libxkbcommon-x11-0

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pillow packaging PyInstaller

    - name: Sistem Dosyalarını Doğrula
      run: |
        echo "📂 Dosya kontrolü yapılıyor..."
        if [ ! -f "sky_kernel_core.py" ] || [ ! -f "sky_setup_ui.py" ]; then
          echo "❌ HATA: Gerekli kaynak kod dosyaları eksik!"
          exit 1
        fi
        echo "✅ Dosya bütünlüğü onaylandı."

    - name: Sanal Ekran Üzerinde Kodu Test Et
      run: |
        # GUI (Arayüz) kodlarının Actions üzerinde çökmeden test edilmesi için sanal ekran (xvfb) kullanıyoruz
        xvfb-run --server-args="-screen 0 1024x768x24" python3 -c "
        try:
            import customtkinter as ctk
            import sky_setup_ui
            import sky_kernel_core
            print('🔥 Sky Core OS Arayüz ve Modülleri Başarıyla Doğrulandı!')
        except Exception as e:
            print(f'❌ Hata çıktı: {e}')
            exit(1)
        "

    - name: Çalıştırılabilir Binary (Executable) Derle
      run: |
        # Projeyi tek parça bağımsız bir uygulama dosyasına dönüştürür
        pyinstaller --onefile --noconsole sky_kernel_core.py

    - name: Derlenen Çıktıyı Artifact Olarak Kaydet
      uses: actions/upload-artifact@v4
      with:
        name: SkyCoreOS-v1.5-Build
        path: dist/sky_kernel_core
