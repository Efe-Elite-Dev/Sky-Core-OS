name: Build WindOS Kernel

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Multi-lib & Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib build-essential nasm xorriso grub-pc-bin

    - name: Assemble Bootloader
      run: |
        if [ -f boot.asm ]; then
          nasm -f elf32 boot.asm -o boot.o
        elif [ -f boot.S ]; then
          gcc -m32 -c boot.S -o boot.o
        else
          echo "Hata: boot.asm veya boot.S dosyası bulunamadı!"
          exit 1
        fi

    - name: Compile Kernel
      run: |
        gcc -m32 -ffreestanding -fno-builtin -O2 -Wall -c kernel.c -o kernel.o

    - name: Link Binaries
      run: |
        ld -m elf_i386 -z noexecstack boot.o kernel.o -o kernel.bin

    - name: Create ISO Structure and Build Image
      run: |
        mkdir -p iso/boot/grub
        cp kernel.bin iso/boot/
        if [ -f grub.cfg ]; then
          cp grub.cfg iso/boot/grub/
        else
          echo 'menuentry "WindOS" { multiboot /boot/kernel.bin; boot }' > iso/boot/grub/grub.cfg
        fi
        grub-mkrescue -o WindOS.iso iso

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WindOS-ISO
        path: WindOS.iso
