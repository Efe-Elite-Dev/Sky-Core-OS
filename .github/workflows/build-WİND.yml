name: Update build-WIND.yml

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Derleme, ISO ve Test Araçlarını Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib build-essential grub-pc-bin xorriso mtools qemu-system-x86

    - name: Kritik Çakışma ve Eski Kalıntı Temizliği
      run: |
        rm -f *.o kernel.bin windos.iso
        rm -f grub.cfg
        rm -rf iso/

    - name: Derleme Motorunu Yetkilendir ve Çalıştır
      id: compile_step
      run: |
        chmod +x build.sh
        ./build.sh
      continue-on-error: false

    - name: 🚀 Çekirdeği Otomatik Test Et (QEMU Çekirdek Doğrulama)
      if: success()
      run: |
        echo "=== Wind OS Otomatik Test Laboratuvarı Başlatıldı ==="
        
        # -serial stdio çakışmasını -display none ve -serial mon:stdio ile tamamen çözdük
        timeout 5s qemu-system-i386 -cdrom windos.iso -display none -serial mon:stdio || true
        
        echo "[+] Test süresi tamamlandı. ISO başarıyla simüle edildi."
        echo "=== BAŞARILI: Çekirdek çökmeden boot döngüsünü tamamladı! ==="

    - name: Üretilen Wind OS ISO Dosyasını Artifact Olarak Kaydet
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: WindOS-Mühürlü-ISO
        path: windos.iso
