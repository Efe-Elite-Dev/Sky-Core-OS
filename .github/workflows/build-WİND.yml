name: Sky-Core-OS Auto-Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y nasm gcc-multilib

      - name: Build System
        run: |
          # 1. Bootloader derle
          nasm -f elf32 boot.asm -o boot.o
          
          # 2. C dosyalarını derle (Eksik dosya varsa buraya ekle)
          # Hata almamak için tüm .c dosyalarını tek tek derliyoruz
          for f in *.c; do
            gcc -m32 -ffreestanding -O2 -Wall -Wextra -fno-pie -fno-stack-protector -c "$f" -o "${f%.c}.o"
          done
          
          # 3. Linkleme (Tüm .o dosyalarını birleştir)
          ld -m elf_i386 -T linker.ld -o kernel.bin *.o

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: kernel.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
