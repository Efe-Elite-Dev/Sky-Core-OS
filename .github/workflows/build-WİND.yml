name: Sky Core OS Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Derleme Araçlarını Kur (GCC, NASM & ISO Sıkıştırma Araçları)
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib g++-multilib nasm make lld binutils grub-common xorriso mtools

    - name: Çalıştırılabilir İzinleri Ver
      run: chmod +x ./build.sh

    - name: Çekirdeği Derle (Saf Terminal Modu)
      run: ./build.sh

    - name: GRUB Kırpma ve 3MB Altı Minimal ISO Oluşturma
      run: |
        # ISO klasör yapısını hazırla
        mkdir -p iso_root/boot/grub
        
        # Çekirdek .bin dosyasını kontrol et ve taşı
        if [ -f bin/kernel.bin ]; then
          cp bin/kernel.bin iso_root/boot/kernel.bin
        elif [ -f kernel.bin ]; then
          cp kernel.bin iso_root/boot/kernel.bin
        else
          echo "HATA: kernel.bin bulunamadı!" && exit 1
        fi
        
        # Minimal GRUB yapılandırması
        cat << 'EOF' > iso_root/boot/grub/grub.cfg
        set timeout=0
        set default=0
        menuentry "Sky Core OS (Saf Core)" {
            multiboot /boot/kernel.bin
            boot
        }
        EOF
        
        # Sadece boot ve terminal modunu destekleyecek GRUB modüllerini seçerek ISO basıyoruz
        # Bu parametreler GRUB'ın tüm font ve video sürücülerini atmasını sağlar, boyutu eritir!
        grub-mkrescue --modules="boot normal multiboot biosdisk ext2 part_msdos" -o skycore.iso iso_root
        
        # Boyut kontrolü yapalım (Boyutu terminal loglarında görmek için)
        echo "=== NİHAİ ISO BOYUTU ==="
        du -sh skycore.iso

    - name: Derleme Çıktılarını Arşivle (Artifact)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: skycore-pure-core-iso
        path: |
          skycore.iso
        if-no-files-found: error
