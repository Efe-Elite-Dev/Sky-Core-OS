name: Build Wind OS (Sky OS Engine)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Sky OS Evrensel Derleme Araçlarını Kur
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq \
          nasm gcc mtools xorriso grub-pc-bin grub-common libisoburn-dev

    - name: Wind OS'u Makefile ile Derle ve ISO Bas
      run: |
        # Önceki kalıntıları temizle ve sıfırdan mermi gibi derle
        make clean
        make

    - name: ISO'yu Actions Artifact Alanına Yükle
      uses: actions/upload-artifact@v4
      with:
        name: windos-release
        path: windos.iso
        if-no-files-found: error
