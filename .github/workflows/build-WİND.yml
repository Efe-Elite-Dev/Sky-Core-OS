name: Update build-WIND.yml

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Derleme ve ISO Araçlarını Kur (Full Paket)
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib build-essential grub-pc-bin xorriso

    - name: Kritik Çakışma ve Eski Kalıntı Temizliği
      run: |
        # VirtualBox'ı kilitleyen eski *.o nesne dosyalarını temizliyoruz
        rm -f *.o kernel.bin windos.iso
        
        # VirtualBox'a hatalı VBE 800 kodu gönderen kökteki eski grub.cfg'yi uçuruyoruz!
        # Böylece build.sh içindeki saf text modlu temiz yapılandırma zorunlu hale gelecek.
        rm -f grub.cfg
        
        # ISO klasör hiyerarşisini sıfırla
        rm -rf iso/

    - name: Derleme Motorunu Yetkilendir ve Çalıştır
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Üretilen Wind OS ISO Dosyasını Artifact Olarak Kaydet
      uses: actions/upload-artifact@v4
      with:
        name: WindOS-Mühürlü-ISO
        path: windos.iso
